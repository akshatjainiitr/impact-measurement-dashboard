services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: impactlens
      POSTGRES_USER: impactlens
      POSTGRES_PASSWORD: impactlens
    ports:
      - "5432:5432"
    volumes:
      - impactlens-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U impactlens -d impactlens"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://impactlens:impactlens@postgres:5432/impactlens?schema=public
      OPENAI_API_KEY: ""
      OPENAI_BASE_URL: https://api.openai.com/v1
      OPENAI_MODEL: gpt-4.1-mini
    ports:
      - "3000:3000"

volumes:
  impactlens-postgres:
